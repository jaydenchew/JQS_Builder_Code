<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — WA System</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        html, body { min-height: 100%; }
        body {
            background:
                radial-gradient(1200px 700px at 10% -10%, rgba(120, 88, 255, 0.22), transparent 50%),
                radial-gradient(900px 600px at 90% 0%, rgba(50, 186, 255, 0.18), transparent 50%),
                #0a1020;
            color: #e8ecff;
            overflow-x: hidden;
        }
        .app-shell {
            width: 111.1112%;
            transform: scale(0.9);
            transform-origin: top left;
        }
        .container { max-width: 1520px; padding-top: 20px; }
        .page-head { margin-bottom: 14px; }
        .page-kicker {
            margin: 0 0 6px;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #93a7ff;
        }
        .page-title { margin: 0; font-size: 27px; color: #e6ecff; }
        .page-subtitle { margin: 6px 0 0; color: #acb6de; font-size: 13px; }
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(109, 127, 206, 0.3);
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 18px;
            background: rgba(27, 42, 85, 0.65);
            border: 1px solid rgba(109, 127, 206, 0.32);
            color: #a8b4df;
            cursor: pointer;
            font-size: 13px;
            border-radius: 999px;
            margin-bottom: 0;
        }
        .tab-btn.active {
            color: #f3f6ff;
            border-color: rgba(151, 170, 255, 0.72);
            font-weight: 600;
            background: linear-gradient(160deg, rgba(58, 81, 156, 0.85), rgba(44, 63, 130, 0.85));
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .inline-form {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 16px;
            padding: 16px;
            background: linear-gradient(160deg, rgba(20, 31, 64, 0.9), rgba(12, 19, 40, 0.95));
            border-radius: 14px;
            border: 1px solid rgba(109, 127, 206, 0.3);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.2);
        }
        .inline-form .form-group { margin-bottom: 0; }
        .inline-form input, .inline-form select { min-width: 100px; }
        .inline-form .btn { border-radius: 999px; border: 1px solid rgba(255, 255, 255, 0.12); }
        .tab-content .card {
            border-radius: 14px;
            border: 1px solid rgba(109, 127, 206, 0.3);
            background: linear-gradient(160deg, rgba(18, 28, 59, 0.92), rgba(12, 18, 40, 0.95));
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .tab-content .card table { margin: 0; }
        .tab-content .card th { background: rgba(38, 53, 102, 0.6); color: #b8c5f1; }
        .tab-content .card td { border-bottom-color: rgba(96, 117, 191, 0.2); }
        table input, table select { min-width: 0; width: auto; }
        td .badge { cursor: default; }
        .active-toggle { cursor: pointer; }
        .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .modal-head h3 { margin: 0; }
        .cam-scan-results {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(160px,1fr));
            gap: 10px;
        }
        .empty-tip { color: var(--text2); }
        .cam-tip { text-align: center; color: var(--text2); grid-column: 1 / -1; padding: 40px; }
    </style>
</head>
<body>
    <div class="app-shell">
    <div id="nav"></div>
    <div class="container">
        <div class="page-head">
            <p class="page-kicker">Operations Console</p>
            <h2 class="page-title">Settings</h2>
            <p class="page-subtitle">Manage arms, stations, phones, and bank app mappings.</p>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('arms')">Arms</button>
            <button class="tab-btn" onclick="switchTab('stations')">Stations</button>
            <button class="tab-btn" onclick="switchTab('phones')">Phones</button>
            <button class="tab-btn" onclick="switchTab('bank-apps')">Bank Apps</button>
        </div>

        <!-- ARMS TAB -->
        <div id="tab-arms" class="tab-content active">
            <div class="inline-form">
                <div class="form-group"><label>Name</label><input id="arm-name" placeholder="ARM-02"></div>
                <div class="form-group"><label>COM Port</label><input id="arm-com" placeholder="COM7"></div>
                <div class="form-group"><label>Service URL</label><input id="arm-url" placeholder="http://127.0.0.1:8082/MyWcfService/getstring" style="min-width:280px;"></div>
                <div class="form-group"><label>Z Down</label><input id="arm-z" type="number" value="10" style="width:60px;"></div>
                <div class="form-group"><label>Camera ID</label><input id="arm-cam" type="number" value="0" style="width:60px;"></div>
                <button class="btn btn-primary" onclick="addArm()">Add Arm</button>
                <button class="btn btn-secondary" onclick="scanCameras()">Scan Cameras</button>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>ID</th><th>Name</th><th>COM Port</th><th>Camera</th><th>Z Down</th><th>Active</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="arms-table"></tbody>
                </table>
            </div>
        </div>

        <!-- STATIONS TAB -->
        <div id="tab-stations" class="tab-content">
            <div class="inline-form">
                <div class="form-group"><label>Arm</label><select id="st-arm"></select></div>
                <div class="form-group"><label>Name</label><input id="st-name" placeholder="Station_1"></div>
                <div class="form-group"><label>X Offset</label><input id="st-offset" type="number" value="0" style="width:80px;"></div>
                <button class="btn btn-primary" onclick="addStation()">Add Station</button>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>ID</th><th>Arm</th><th>Name</th><th>X Offset</th><th>Stall Photo</th><th>Calibration</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="stations-table"></tbody>
                </table>
            </div>
        </div>

        <!-- PHONES TAB -->
        <div id="tab-phones" class="tab-content">
            <div class="inline-form">
                <div class="form-group"><label>Station</label><select id="ph-station"></select></div>
                <div class="form-group"><label>Name</label><input id="ph-name" placeholder="Phone-S5"></div>
                <div class="form-group"><label>Model</label><input id="ph-model" placeholder="Samsung A15"></div>
                <button class="btn btn-primary" onclick="addPhone()">Add Phone</button>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>ID</th><th>Arm</th><th>Station</th><th>Name</th><th>Model</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="phones-table"></tbody>
                </table>
            </div>
        </div>

        <!-- BANK APPS TAB -->
        <div id="tab-bank-apps" class="tab-content">
            <div class="inline-form">
                <div class="form-group"><label>Station</label><select id="ba-station"></select></div>
                <div class="form-group"><label>Phone</label><select id="ba-phone"></select></div>
                <div class="form-group"><label>Bank Code</label><input id="ba-code" placeholder="ABA"></div>
                <div class="form-group"><label>Bank Name</label><input id="ba-name" placeholder="ABA Bank"></div>
                <div class="form-group"><label>Account No</label><input id="ba-account" placeholder=""></div>
                <div class="form-group"><label>Password</label><input id="ba-pwd" placeholder=""></div>
                <div class="form-group"><label>PIN</label><input id="ba-pin" placeholder="(optional)"></div>
                <button class="btn btn-primary" onclick="addBankApp()">Add Bank App</button>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>ID</th><th>Arm</th><th>Station</th><th>Phone</th><th>Bank</th><th>Account</th><th>PIN</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="bank-apps-table"></tbody>
                </table>
            </div>
        </div>
    </div>
    </div>

    <!-- Camera Scan Modal -->
    <div class="modal-overlay" id="cam-scan-modal" onclick="if(event.target===this)this.classList.remove('active')">
        <div class="modal" style="max-width:700px;max-height:85vh;overflow-y:auto;">
            <div class="modal-head">
                <h3>Camera Scan</h3>
                <button class="btn btn-sm btn-secondary" onclick="document.getElementById('cam-scan-modal').classList.remove('active')">Close</button>
            </div>
            <div id="cam-scan-results" class="cam-scan-results">
                <div class="cam-tip">Scanning cameras...</div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
    let armsData = [], stationsData = [], phonesData = [], bankAppsData = [], calData = {};

    function switchTab(name) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelector(`.tab-btn[onclick="switchTab('${name}')"]`).classList.add('active');
        document.getElementById('tab-' + name).classList.add('active');
    }

    async function loadAll() {
        [armsData, stationsData, phonesData, bankAppsData, calData] = await Promise.all([
            API.get('/api/stations/arms'),
            API.get('/api/stations/'),
            API.get('/api/stations/phones'),
            API.get('/api/banks/apps'),
            API.get('/api/calibration/status'),
        ]);
        renderArms();
        renderStations();
        renderPhones();
        renderBankApps();
        populateSelects();
    }

    function populateSelects() {
        const armOpts = armsData.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        document.getElementById('st-arm').innerHTML = armOpts;

        const stOpts = stationsData.map(s => `<option value="${s.id}">${s.name} (${s.arm_name})</option>`).join('');
        document.getElementById('ph-station').innerHTML = stOpts;
        document.getElementById('ba-station').innerHTML = stOpts;

        const phOpts = phonesData.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        document.getElementById('ba-phone').innerHTML = phOpts;
    }

    // === ARMS ===
    function renderArms() {
        document.getElementById('arms-table').innerHTML = armsData.map(a => `<tr>
            <td>${a.id}</td>
            <td><input value="${a.name||''}" id="a-name-${a.id}" style="width:110px;"></td>
            <td><input value="${a.com_port||''}" id="a-com-${a.id}" style="width:80px;"></td>
            <td><input value="${a.camera_id}" id="a-cam-${a.id}" type="number" style="width:60px;"></td>
            <td><input value="${a.z_down}" id="a-z-${a.id}" type="number" style="width:60px;"></td>
            <td><span class="badge ${a.active ? 'badge-active' : 'badge-inactive'} active-toggle" onclick="toggleArmActive(${a.id}, ${a.active})">${a.active ? 'ON' : 'OFF'}</span></td>
            <td><span class="badge badge-${a.status === 'idle' ? 'idle' : a.status === 'busy' ? 'busy' : 'inactive'}">${a.status}</span></td>
            <td>
                <button class="btn btn-sm btn-primary" onclick="saveArm(${a.id})">Save</button>
                <button class="btn btn-sm btn-danger" onclick="deleteArm(${a.id})">Del</button>
            </td>
        </tr>`).join('') || '<tr><td colspan="8" class="empty-tip">No arms</td></tr>';
    }

    async function addArm() {
        const r = await API.post('/api/stations/arms', {
            name: document.getElementById('arm-name').value,
            com_port: document.getElementById('arm-com').value,
            service_url: document.getElementById('arm-url').value || 'http://127.0.0.1:8082/MyWcfService/getstring',
            z_down: parseInt(document.getElementById('arm-z').value) || 10,
            camera_id: parseInt(document.getElementById('arm-cam').value) || 0,
        });
        if (r.success) { toast('Arm created (ID: ' + r.id + ')'); loadAll(); }
        else toast(r.error || 'Failed', 'error');
    }

    async function toggleArmActive(id, current) {
        await API.put(`/api/stations/arms/${id}`, { active: !current });
        loadAll();
    }

    async function saveArm(id) {
        await API.put(`/api/stations/arms/${id}`, {
            name: document.getElementById('a-name-' + id).value,
            com_port: document.getElementById('a-com-' + id).value,
            camera_id: parseInt(document.getElementById('a-cam-' + id).value) || 0,
            z_down: parseInt(document.getElementById('a-z-' + id).value) || 10,
        });
        toast('Arm saved');
        loadAll();
    }

    async function deleteArm(id) {
        if (!confirm('Delete this arm? All associated stations must be removed first.')) return;
        const r = await API.del(`/api/stations/arms/${id}`);
        if (r.success) { toast('Arm deleted'); loadAll(); }
        else toast(r.error || 'Failed', 'error');
    }

    async function scanCameras() {
        document.getElementById('cam-scan-modal').classList.add('active');
        document.getElementById('cam-scan-results').innerHTML =
            '<div class="cam-tip">Scanning cameras (this takes ~10 seconds)...</div>';
        const r = await API.post('/api/stations/scan-cameras', { max_index: 9 });
        if (!r.cameras) { document.getElementById('cam-scan-results').innerHTML = '<div style="color:var(--danger)">Scan failed</div>'; return; }

        const armByCam = {};
        armsData.forEach(a => { armByCam[a.camera_id] = a.name; });

        const visible = r.cameras.filter(c => c.status !== 'unavailable');
        if (!visible.length) {
            document.getElementById('cam-scan-results').innerHTML = '<div class="cam-tip">No cameras detected. Make sure USB cameras are connected.</div>';
            return;
        }
        document.getElementById('cam-scan-results').innerHTML = visible.map(c => {
            const assigned = armByCam[c.index] ? '<div style="color:var(--accent);font-size:11px;margin-top:4px;">Assigned: ' + armByCam[c.index] + '</div>' : '';
            if (c.status === 'available') {
                return '<div style="border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center;">' +
                    '<div style="font-weight:600;margin-bottom:4px;">Camera ' + c.index + '</div>' +
                    '<img src="data:image/jpeg;base64,' + c.preview + '" style="width:100%;border-radius:4px;max-height:180px;object-fit:contain;">' +
                    assigned + '</div>';
            } else if (c.status === 'occupied') {
                const occArm = c.arm_name || armByCam[c.index] || '';
                return '<div style="border:1px solid var(--warning);border-radius:8px;padding:8px;text-align:center;background:rgba(255,152,0,0.08);">' +
                    '<div style="font-weight:600;margin-bottom:4px;">Camera ' + c.index + '</div>' +
                    '<div style="color:var(--warning);padding:30px 0;font-size:12px;">Occupied' + (occArm ? ' (' + occArm + ')' : '') + '</div>' +
                    '</div>';
            } else {
                return '<div style="border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center;opacity:0.4;">' +
                    '<div style="font-weight:600;margin-bottom:4px;">Camera ' + c.index + '</div>' +
                    '<div style="color:var(--text2);padding:30px 0;font-size:12px;">Not detected</div>' +
                    '</div>';
            }
        }).join('');
    }

    // === STATIONS ===
    function renderStations() {
        document.getElementById('stations-table').innerHTML = stationsData.map(s => {
            const cal = calData[s.id];
            const calOk = cal && cal.calibrated;
            return `<tr>
            <td>${s.id}</td>
            <td>${s.arm_name}</td>
            <td><input value="${s.name||''}" id="s-name-${s.id}" style="width:90px;"></td>
            <td><input value="${s.x_offset}" id="s-off-${s.id}" type="number" step="0.1" style="width:70px;"></td>
            <td>
                <input value="${s.stall_photo_x!=null?s.stall_photo_x:''}" id="s-spx-${s.id}" type="number" step="0.1" style="width:65px;" placeholder="X">
                <input value="${s.stall_photo_y!=null?s.stall_photo_y:''}" id="s-spy-${s.id}" type="number" step="0.1" style="width:65px;" placeholder="Y">
            </td>
            <td>
                <span class="badge ${calOk ? 'badge-active' : 'badge-inactive'}">${calOk ? 'OK (scale=' + cal.scale + ')' : 'Not calibrated'}</span>
                <button class="btn btn-sm btn-secondary" onclick="viewCalibration(${s.id})" style="margin-left:4px;">View</button>
            </td>
            <td>
                <select id="s-st-${s.id}" style="width:80px;">
                    <option value="active" ${s.status==='active'?'selected':''}>active</option>
                    <option value="inactive" ${s.status==='inactive'?'selected':''}>inactive</option>
                </select>
            </td>
            <td>
                <button class="btn btn-sm btn-primary" onclick="saveStation(${s.id})">Save</button>
                <button class="btn btn-sm btn-danger" onclick="deleteStation(${s.id})">Del</button>
            </td>
        </tr>`}).join('') || '<tr><td colspan="8" class="empty-tip">No stations</td></tr>';
    }

    async function addStation() {
        const r = await API.post('/api/stations/', {
            arm_id: parseInt(document.getElementById('st-arm').value),
            name: document.getElementById('st-name').value,
            x_offset: parseFloat(document.getElementById('st-offset').value) || 0,
        });
        if (r.success) { toast('Station created (ID: ' + r.id + ')'); loadAll(); }
        else toast(r.error || 'Failed', 'error');
    }

    async function saveStation(id) {
        const spx = document.getElementById('s-spx-' + id).value;
        const spy = document.getElementById('s-spy-' + id).value;
        await API.put(`/api/stations/${id}`, {
            name: document.getElementById('s-name-' + id).value,
            x_offset: parseFloat(document.getElementById('s-off-' + id).value) || 0,
            stall_photo_x: spx !== '' ? parseFloat(spx) : null,
            stall_photo_y: spy !== '' ? parseFloat(spy) : null,
            status: document.getElementById('s-st-' + id).value,
        });
        toast('Station saved');
        loadAll();
    }

    async function deleteStation(id) {
        if (!confirm('Delete this station?')) return;
        const r = await API.del(`/api/stations/${id}`);
        if (r.success) { toast('Station deleted'); loadAll(); }
        else toast(r.error || 'Failed', 'error');
    }

    // === PHONES ===
    function renderPhones() {
        document.getElementById('phones-table').innerHTML = phonesData.map(p => `<tr>
            <td>${p.id}</td>
            <td>${p.arm_name || '-'}</td>
            <td>${p.station_name}</td>
            <td><input value="${p.name||''}" id="p-name-${p.id}" style="width:100px;"></td>
            <td><input value="${p.model||''}" id="p-model-${p.id}" style="width:120px;"></td>
            <td>
                <select id="p-st-${p.id}" style="width:80px;">
                    <option value="active" ${p.status==='active'?'selected':''}>active</option>
                    <option value="inactive" ${p.status==='inactive'?'selected':''}>inactive</option>
                </select>
            </td>
            <td>
                <button class="btn btn-sm btn-primary" onclick="savePhone(${p.id})">Save</button>
                <button class="btn btn-sm btn-danger" onclick="deletePhone(${p.id})">Del</button>
            </td>
        </tr>`).join('') || '<tr><td colspan="6" class="empty-tip">No phones</td></tr>';
    }

    async function addPhone() {
        const r = await API.post('/api/stations/phones', {
            station_id: parseInt(document.getElementById('ph-station').value),
            name: document.getElementById('ph-name').value,
            model: document.getElementById('ph-model').value,
        });
        if (r.success) { toast('Phone created'); loadAll(); }
        else toast(r.error || 'Failed', 'error');
    }

    async function savePhone(id) {
        await API.put(`/api/stations/phones/${id}`, {
            name: document.getElementById('p-name-' + id).value,
            model: document.getElementById('p-model-' + id).value,
            status: document.getElementById('p-st-' + id).value,
        });
        toast('Phone saved');
        loadAll();
    }

    async function deletePhone(id) {
        if (!confirm('Delete this phone?')) return;
        const r = await API.del(`/api/stations/phones/${id}`);
        if (r.success) { toast('Phone deleted'); loadAll(); }
        else toast(r.error || 'Failed', 'error');
    }

    // === BANK APPS ===
    function renderBankApps() {
        document.getElementById('bank-apps-table').innerHTML = bankAppsData.map(b => `<tr>
            <td>${b.id}</td>
            <td>${b.arm_name || '-'}</td>
            <td>${b.station_name}</td>
            <td>${b.phone_name || '-'}</td>
            <td><input value="${b.bank_code||''}" id="b-code-${b.id}" style="width:80px;"> <input value="${b.bank_name||''}" id="b-bname-${b.id}" style="width:120px;"></td>
            <td><input value="${b.account_no||''}" id="b-acct-${b.id}" style="width:150px;"></td>
            <td><input value="${b.pin||''}" id="b-pin-${b.id}" style="width:80px;" placeholder="PIN"></td>
            <td>
                <select id="b-st-${b.id}" style="width:90px;">
                    <option value="active" ${b.status==='active'?'selected':''}>active</option>
                    <option value="suspended" ${b.status==='suspended'?'selected':''}>suspended</option>
                </select>
            </td>
            <td>
                <button class="btn btn-sm btn-primary" onclick="saveBankApp(${b.id})">Save</button>
                <button class="btn btn-sm btn-danger" onclick="deleteBankApp(${b.id})">Del</button>
            </td>
        </tr>`).join('') || '<tr><td colspan="9" class="empty-tip">No bank apps</td></tr>';
    }

    async function addBankApp() {
        const r = await API.post('/api/banks/apps', {
            station_id: parseInt(document.getElementById('ba-station').value),
            phone_id: parseInt(document.getElementById('ba-phone').value),
            bank_code: document.getElementById('ba-code').value,
            bank_name: document.getElementById('ba-name').value,
            account_no: document.getElementById('ba-account').value,
            password: document.getElementById('ba-pwd').value,
            pin: document.getElementById('ba-pin').value || null,
        });
        if (r.success) { toast('Bank app created'); loadAll(); }
        else toast(r.error || 'Failed', 'error');
    }

    async function saveBankApp(id) {
        await API.put(`/api/banks/apps/${id}`, {
            bank_code: document.getElementById('b-code-' + id).value,
            bank_name: document.getElementById('b-bname-' + id).value,
            account_no: document.getElementById('b-acct-' + id).value,
            pin: document.getElementById('b-pin-' + id)?.value || null,
            status: document.getElementById('b-st-' + id).value,
        });
        toast('Bank app saved');
        loadAll();
    }

    async function deleteBankApp(id) {
        if (!confirm('Delete this bank app?')) return;
        const r = await API.del(`/api/banks/apps/${id}`);
        if (r.success) { toast('Bank app deleted'); loadAll(); }
        else toast(r.error || 'Failed', 'error');
    }

    async function viewCalibration(stationId) {
        const data = await API.get(`/api/calibration/${stationId}`);
        if (data.error) {
            alert('Station ' + stationId + ': Not calibrated.\n\nTo calibrate, use the Flow Builder page with the correct arm selected, then run the calibration procedure.');
            return;
        }
        const m = data.transform_matrix;
        const info = [
            'Station ' + stationId + ' Calibration Data:',
            '',
            'Transform Matrix:',
            '  [' + m[0].map(v => v.toFixed(6)).join(', ') + ']',
            '  [' + m[1].map(v => v.toFixed(6)).join(', ') + ']',
            '',
            'Camera Park Position: (' + data.camera_park_pos[0] + ', ' + data.camera_park_pos[1] + ')',
            'Scale: ' + data.scale_mm_per_pixel + ' mm/pixel',
            'Rotation: ' + data.rotation_degrees + ' degrees',
            'Raw Height: ' + data.raw_height + ' px',
        ].join('\n');
        alert(info);
    }

    loadAll();
