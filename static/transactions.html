<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions — WA System</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ── Filters bar ── */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
            padding: 14px 16px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-group label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-3);
            margin-bottom: 0;
        }

        .filter-group select,
        .filter-group input {
            width: auto;
            min-width: 110px;
            padding: 6px 10px;
            font-size: 12px;
        }

        .filters .divider {
            width: 1px;
            height: 32px;
            background: var(--border);
            align-self: flex-end;
            margin: 0 4px;
        }

        .filter-actions {
            display: flex;
            gap: 6px;
            align-items: flex-end;
            margin-left: auto;
        }

        .tx-count {
            font-size: 12px;
            color: var(--text-3);
            font-family: var(--font-mono);
            align-self: flex-end;
            padding-bottom: 7px;
        }

        /* ── Transaction table ── */
        .tx-table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .tx-row { cursor: pointer; }
        .tx-row:hover td { background: rgba(255,255,255,0.025) !important; }

        .tx-id {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-3);
        }

        .tx-amount {
            font-family: var(--font-mono);
            font-weight: 600;
        }

        .tx-dur {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-2);
        }

        /* ── Detail modal ── */
        #detail-modal .modal {
            max-width: 720px;
            max-height: 85vh;
            overflow-y: auto;
            overscroll-behavior: contain;
            width: 92vw;
        }

        .detail-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .detail-head h3 { margin: 0; font-size: 15px; font-weight: 700; }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .detail-field label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-3);
            margin-bottom: 3px;
        }

        .detail-field .val {
            font-size: 13px;
            color: var(--text);
            font-weight: 500;
        }

        .detail-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-3);
            margin: 16px 0 8px;
        }

        .detail-error {
            margin-bottom: 12px;
            color: var(--danger);
            font-size: 12px;
            background: var(--danger-dim);
            padding: 8px 10px;
            border-radius: var(--radius);
        }

        /* ── Step logs ── */
        #detail-logs-container {
            max-height: 40vh;
            overflow-y: auto;
            overscroll-behavior: contain;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--bg);
        }

        .log-item {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }
        .log-item:last-child { border-bottom: none; }
        .log-item.fail { background: oklch(0.65 0.2 24 / 0.05); }

        .step-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .step-info .step-name { font-weight: 500; color: var(--text); }
        .step-info .step-result { font-family: var(--font-mono); font-size: 11px; }
        .step-info .step-result.ok  { color: var(--success); }
        .step-info .step-result.fail { color: var(--danger); }

        .detail-ocr { font-size: 11px; color: var(--text-3); margin-top: 3px; font-family: var(--font-mono); }
        .detail-msg { font-size: 11px; color: var(--danger); margin-top: 3px; }
        .screenshot-btn { cursor: pointer; color: var(--accent); font-size: 11px; margin-top: 4px; display: inline-block; }
        .screenshot-btn:hover { text-decoration: underline; }

        .empty-tip { color: var(--text-2); padding: 24px; text-align: center; font-size: 13px; }

        /* ── Screenshot modal ── */
        .screen-modal {
            max-width: 520px;
            text-align: center;
        }
        .modal-img { max-width: 100%; border-radius: var(--radius-lg); }
        .screen-modal-footer { margin-top: 14px; }
    </style>
</head>
<body>
    <div id="nav"></div>
    <div class="container">

        <div class="page-head">
            <p class="page-kicker">Operations Console</p>
            <h1 class="page-title">Transactions</h1>
            <p class="page-subtitle">Review transaction lifecycle, status, and execution logs.</p>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label>Status</label>
                <select id="filter-status">
                    <option value="">All</option>
                    <option value="queued">Queued</option>
                    <option value="running">Running</option>
                    <option value="success">Success</option>
                    <option value="failed">Failed</option>
                    <option value="stall">Stall</option>
                </select>
            </div>
            <div class="filter-group">
                <label>From Bank</label>
                <select id="filter-bank"><option value="">All</option></select>
            </div>
            <div class="filter-group">
                <label>To Bank</label>
                <select id="filter-to-bank"><option value="">All</option></select>
            </div>
            <div class="filter-group">
                <label>Arm</label>
                <select id="filter-arm"><option value="">All Arms</option></select>
            </div>
            <div class="divider"></div>
            <div class="filter-group">
                <label>From Date</label>
                <input type="date" id="filter-date-from">
            </div>
            <div class="filter-group">
                <label>To Date</label>
                <input type="date" id="filter-date-to">
            </div>
            <div class="filter-group">
                <label>Rows</label>
                <select id="filter-pagesize" style="min-width:70px;">
                    <option value="50">50</option>
                    <option value="100" selected>100</option>
                    <option value="200">200</option>
                    <option value="500">500</option>
                    <option value="">All</option>
                </select>
            </div>
            <div class="filter-actions">
                <button class="btn btn-primary" onclick="loadTransactions()">Filter</button>
                <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
                <span id="tx-count" class="tx-count"></span>
            </div>
        </div>

        <!-- Table -->
        <div class="tx-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Process ID</th>
                        <th>Arm</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Duration</th>
                    </tr>
                </thead>
                <tbody id="tx-body"></tbody>
            </table>
        </div>

    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detail-modal">
        <div class="modal">
            <div class="detail-head">
                <h3 id="detail-title">Transaction Detail</h3>
                <button class="btn btn-secondary btn-sm" onclick="closeDetail()">Close</button>
            </div>
            <div id="detail-info"></div>
            <p class="detail-section-title">Step Logs</p>
            <div id="detail-logs-container">
                <div id="detail-logs"></div>
            </div>
        </div>
    </div>

    <!-- Screenshot Modal -->
    <div class="modal-overlay" id="screenshot-modal">
        <div class="modal screen-modal">
            <img id="screenshot-img" class="modal-img" alt="Screenshot" />
            <div class="screen-modal-footer">
                <button class="btn btn-secondary" onclick="closeScreenshot()">Close</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="resend-modal">
        <div class="modal" style="max-width:520px;max-height:85vh;overflow-y:auto;overscroll-behavior:contain;">
            <style>
                #resend-modal input[type="radio"],
                #resend-modal input[type="checkbox"] {
                    width: auto;
                    margin: 0;
                    flex-shrink: 0;
                }
                #resend-modal .resend-choice,
                #resend-modal .resend-checkbox-row {
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    cursor: pointer;
                    font-size: 13px;
                }
                #resend-modal .resend-choice { padding: 6px 0; }
                #resend-modal .resend-checkbox-row { padding: 4px 0; }
            </style>
            <div class="detail-head">
                <h3 style="margin-top:0;">Resend PAS Callback</h3>
                <button class="btn btn-sm btn-secondary" onclick="closeResend()">Close</button>
            </div>
            <div id="resend-body"></div>
            <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">
                <button class="btn btn-secondary" onclick="closeResend()">Cancel</button>
                <button id="resend-submit" class="btn btn-primary" onclick="submitResend()">Resend Callback</button>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
    async function loadFilters() {
        const [apps, arms] = await Promise.all([
            API.get('/api/banks/apps'),
            API.get('/api/stations/arms'),
        ]);
        const banks = [...new Set((Array.isArray(apps) ? apps : []).map(a => a.bank_code))].sort();
        document.getElementById('filter-bank').innerHTML = '<option value="">All</option>' +
            banks.map(b => `<option value="${b}">${b}</option>`).join('');
        const mappings = await API.get('/api/banks/mappings');
        const toBanks = [...new Set((Array.isArray(mappings) ? mappings : []).map(m => m.to_bank_code))].sort();
        document.getElementById('filter-to-bank').innerHTML = '<option value="">All</option>' +
            toBanks.map(b => `<option value="${b}">${b}</option>`).join('');
        document.getElementById('filter-arm').innerHTML = '<option value="">All Arms</option>' +
            (Array.isArray(arms) ? arms : []).map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    }

    function clearFilters() {
        ['filter-status','filter-bank','filter-to-bank','filter-arm'].forEach(id => {
            document.getElementById(id).value = '';
        });
        document.getElementById('filter-date-from').value = '';
        document.getElementById('filter-date-to').value = '';
        document.getElementById('filter-pagesize').value = '100';
        loadTransactions();
    }

    async function loadTransactions() {
        const status   = document.getElementById('filter-status').value;
        const bank     = document.getElementById('filter-bank').value;
        const toBank   = document.getElementById('filter-to-bank').value;
        const arm      = document.getElementById('filter-arm').value;
        const dateFrom = document.getElementById('filter-date-from').value;
        const dateTo   = document.getElementById('filter-date-to').value;
        const pageSize = document.getElementById('filter-pagesize').value;
        const params   = pageSize ? ['limit=' + pageSize] : ['limit=0'];
        params.push('tz=' + getDisplayTZ());
        if (status)   params.push('status='    + status);
        if (bank)     params.push('bank='      + bank);
        if (toBank)   params.push('to_bank='   + toBank);
        if (arm)      params.push('arm_id='    + arm);
        if (dateFrom) params.push('date_from=' + dateFrom);
        if (dateTo)   params.push('date_to='   + dateTo);

        const rows = await API.get('/api/monitor/transactions?' + params.join('&'));
        const tbody = document.getElementById('tx-body');
        document.getElementById('tx-count').textContent =
            (Array.isArray(rows) ? rows.length : 0) + ' rows';

        tbody.innerHTML = (Array.isArray(rows) ? rows : []).map(tx => {
            const dur = tx.started_at && tx.finished_at
                ? Math.round((new Date(tx.finished_at) - new Date(tx.started_at)) / 1000) + 's'
                : '—';
            return `<tr class="tx-row" onclick="showDetail(${tx.id})">
                <td class="tx-id">#${tx.id}</td>
                <td class="tx-id">${tx.process_id}</td>
                <td>${tx.arm_name || '—'}</td>
                <td><strong>${tx.pay_from_bank_code}</strong></td>
                <td>${tx.pay_to_bank_code || '—'}</td>
                <td class="tx-amount">$${tx.amount}</td>
                <td><span class="status-${tx.status}">${tx.status}</span></td>
                <td style="font-family:var(--font-mono);font-size:12px;">${formatTZ(tx.created_at)}</td>
                <td class="tx-dur">${dur}</td>
            </tr>`;
        }).join('') || '<tr><td colspan="9" class="empty-tip">No transactions found</td></tr>';
    }

    async function showDetail(id) {
        const [tx, logs] = await Promise.all([
            API.get(`/api/monitor/transactions/${id}`),
            API.get(`/api/monitor/transactions/${id}/logs`)
        ]);
        document.getElementById('detail-title').textContent = `Transaction #${tx.id} — Process ${tx.process_id}`;

        const cbStatusHtml = tx.callback_sent_at
            ? `<span style="color:var(--success);">Sent ${formatTZ(tx.callback_sent_at)}</span>`
            : `<span style="color:var(--warning);">Not sent yet</span>`;
        const isFinished = tx.status !== 'queued' && tx.status !== 'running';
        const btnLabel = tx.callback_sent_at ? 'Resend Callback' : 'Send Callback';
        const btnClass = tx.callback_sent_at ? 'btn-secondary' : 'btn-primary';
        const btnAttrs = isFinished ? '' : 'disabled title="Transaction not finished"';

        document.getElementById('detail-info').innerHTML = `
            <div class="detail-grid">
                <div class="detail-field"><label>From</label><div class="val">${tx.pay_from_bank_code}</div></div>
                <div class="detail-field"><label>To</label><div class="val">${tx.pay_to_bank_code || '—'}</div></div>
                <div class="detail-field"><label>Amount</label><div class="val tx-amount">$${tx.amount}</div></div>
                <div class="detail-field"><label>Status</label><div class="val status-${tx.status}">${tx.status}</div></div>
                <div class="detail-field"><label>To Account</label><div class="val" style="font-family:var(--font-mono);font-size:12px;">${tx.pay_to_account_no}</div></div>
                <div class="detail-field"><label>Created</label><div class="val" style="font-family:var(--font-mono);font-size:12px;">${formatTZ(tx.created_at)}</div></div>
                <div class="detail-field"><label>Started</label><div class="val" style="font-family:var(--font-mono);font-size:12px;">${formatTZ(tx.started_at)}</div></div>
                <div class="detail-field"><label>Finished</label><div class="val" style="font-family:var(--font-mono);font-size:12px;">${formatTZ(tx.finished_at)}</div></div>
                ${tx.pay_to_account_name ? `<div class="detail-field" style="grid-column:1/-1"><label>To Name</label><div class="val">${tx.pay_to_account_name}</div></div>` : ''}
                <div class="detail-field" style="grid-column:1/-1"><label>Callback</label>
                    <div class="val" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                        ${cbStatusHtml}
                        <button class="btn btn-sm ${btnClass}" ${btnAttrs}
                                onclick="openResendDialog(${tx.id})">${btnLabel}</button>
                    </div>
                </div>
            </div>
            ${tx.error_message ? `<div class="detail-error">Error: ${tx.error_message}</div>` : ''}
        `;
        document.getElementById('detail-logs').innerHTML = logs.map(l => `
            <div class="log-item ${l.result === 'fail' ? 'fail' : ''}">
                <div class="step-info">
                    <span class="step-name">${l.step_number}. ${l.step_name} <span style="color:var(--text-3);font-size:11px;">(${l.action_type})</span></span>
                    <span class="step-result ${l.result === 'ok' ? 'ok' : 'fail'}">${l.result === 'ok' ? '✓' : '✗'}${l.duration_ms ? ' ' + l.duration_ms + 'ms' : ''}</span>
                </div>
                ${l.ocr_text ? `<div class="detail-ocr">OCR: ${l.ocr_text.substring(0,100)}</div>` : ''}
                ${l.message   ? `<div class="detail-msg">${l.message.substring(0,200)}</div>` : ''}
                ${l.has_screenshot ? `<span class="screenshot-btn" onclick="showScreenshot(${tx.id},${l.id})">View Screenshot</span>` : ''}
            </div>
        `).join('') || '<div class="empty-tip">No logs</div>';

        document.getElementById('detail-modal').classList.add('active');
    }

    function closeDetail()     { document.getElementById('detail-modal').classList.remove('active'); }
    function closeScreenshot() { document.getElementById('screenshot-modal').classList.remove('active'); }

    async function showScreenshot(txId, logId) {
        const data = await API.get(`/api/monitor/transactions/${txId}/logs/${logId}/screenshot`);
        if (data.screenshot) {
            document.getElementById('screenshot-img').src = 'data:image/jpeg;base64,' + data.screenshot;
            document.getElementById('screenshot-modal').classList.add('active');
        } else {
            toast('No screenshot available', 'error');
        }
    }

    let resendCtx = null;

    async function openResendDialog(txId) {
        const tx = await API.get(`/api/monitor/transactions/${txId}`);
        if (!tx || tx.error) {
            toast('Failed to load transaction: ' + (tx?.error || 'unknown'), 'error');
            return;
        }
        resendCtx = { tx_id: txId, current_status: tx.status };

        const dbToCode = { success: 1, failed: 2, review: 3, stall: 4 };
        const currentCode = dbToCode[tx.status] || 4;
        const hasReceipt = !!tx.receipt_base64;
        const receiptHtml = hasReceipt
            ? `<img src="data:image/jpeg;base64,${tx.receipt_base64}" style="max-width:100%;border-radius:8px;border:1px solid var(--border);"/>`
            : '<div class="empty-tip">No receipt photo on file for this transaction.</div>';
        const statusOptions = [
            [1, 'success', 'Bank confirmed transfer'],
            [2, 'failed',  'Bank rejected'],
            [3, 'review',  'Bank pending / in review'],
            [4, 'stall',   'Automation broke before / during transfer'],
        ];

        document.getElementById('resend-body').innerHTML = `
            <div style="font-size:13px;margin-bottom:10px;color:var(--text-2);">
                Transaction <strong style="color:var(--text);">#${tx.id}</strong> &middot;
                Process <strong style="color:var(--text);">${tx.process_id}</strong> &middot;
                Current DB status: <strong class="status-${tx.status}">${tx.status}</strong>
                ${tx.callback_sent_at
                    ? `<br><span style="font-size:11px;">Last callback sent at ${formatTZ(tx.callback_sent_at)}</span>`
                    : `<br><span style="font-size:11px;color:var(--warning);">Callback never sent for this transaction.</span>`
                }
            </div>
            <div style="margin-bottom:14px;">${receiptHtml}</div>
            <div style="margin-bottom:12px;">
                <label style="font-size:11px;color:var(--text-2);display:block;margin-bottom:6px;">
                    Re-send as which status?
                </label>
                ${statusOptions.map(([code, label, help]) => `
                    <label class="resend-choice">
                        <input type="radio" name="resend-status" value="${code}" ${code === currentCode ? 'checked' : ''}>
                        <span>
                            <strong>${label}</strong>
                            <span style="color:var(--text-2);">(status=${code})</span>
                            <span style="font-size:11px;color:var(--text-2);margin-left:6px;">— ${help}</span>
                        </span>
                    </label>
                `).join('')}
            </div>
            <label class="resend-checkbox-row">
                <input type="checkbox" id="resend-include-receipt" ${hasReceipt ? 'checked' : 'disabled'}>
                <span>Include receipt photo with callback${hasReceipt ? '' : ' (no receipt available)'}</span>
            </label>
            <label class="resend-checkbox-row">
                <input type="checkbox" id="resend-update-db" checked>
                <span>Update DB status if different from current</span>
            </label>
        `;
        document.getElementById('resend-modal').classList.add('active');
    }

    function closeResend() {
        document.getElementById('resend-modal').classList.remove('active');
        resendCtx = null;
    }

    async function submitResend() {
        if (!resendCtx) return;
        const radio = document.querySelector('input[name="resend-status"]:checked');
        if (!radio) { toast('Please choose a status', 'error'); return; }
        const status = parseInt(radio.value);
        const include_receipt = document.getElementById('resend-include-receipt').checked;
        const update_db_status = document.getElementById('resend-update-db').checked;

        const btn = document.getElementById('resend-submit');
        const originalLabel = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Sending...';
        try {
            const r = await API.post(
                `/api/monitor/transactions/${resendCtx.tx_id}/resend-callback`,
                { status, include_receipt, update_db_status });
            if (r.ok) {
                toast(r.db_status_changed
                    ? `Callback sent. DB status updated to '${r.new_db_status}'.`
                    : 'Callback sent successfully.', 'success');
                const txId = resendCtx.tx_id;
                closeResend();
                showDetail(txId);
                loadTransactions();
            } else {
                toast('Resend failed: ' + (r.error || 'unknown error'), 'error');
            }
        } catch (e) {
            toast('Network error: ' + e.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = originalLabel;
        }
    }

    document.getElementById('detail-modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeDetail();
    });
    document.getElementById('screenshot-modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeScreenshot();
    });
    document.getElementById('resend-modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeResend();
    });
    document.addEventListener('keydown', e => {
        if (e.key !== 'Escape') return;
        if (document.getElementById('screenshot-modal').classList.contains('active')) closeScreenshot();
        else if (document.getElementById('resend-modal').classList.contains('active')) closeResend();
        else if (document.getElementById('detail-modal').classList.contains('active')) closeDetail();
    });

    window.addEventListener('displaytz:changed', loadTransactions);

    loadFilters();
    loadTransactions();
    </script>
</body>
</html>
