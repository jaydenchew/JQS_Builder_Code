<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions — WA System</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        html, body { min-height: 100%; }
        body {
            background:
                radial-gradient(1200px 700px at 10% -10%, rgba(120, 88, 255, 0.22), transparent 50%),
                radial-gradient(900px 600px at 90% 0%, rgba(50, 186, 255, 0.18), transparent 50%),
                #0a1020;
            color: #e8ecff;
            overflow-x: hidden;
        }
        .app-shell {
            width: 111.1112%;
            transform: scale(0.9);
            transform-origin: top left;
        }
        .container { max-width: 1520px; padding-top: 20px; }
        .page-head { margin-bottom: 14px; }
        .page-kicker {
            margin: 0 0 6px;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #93a7ff;
        }
        .page-title { margin: 0; font-size: 27px; color: #e6ecff; }
        .page-subtitle { margin: 6px 0 0; color: #acb6de; font-size: 13px; }
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
            flex-wrap: wrap;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(109, 127, 206, 0.3);
            background: linear-gradient(160deg, rgba(20, 31, 64, 0.9), rgba(12, 19, 40, 0.95));
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.2);
        }
        .filters select, .filters input { width: auto; min-width: 120px; }
        .filters .btn { border-radius: 999px; border: 1px solid rgba(255, 255, 255, 0.12); }
        .filters .btn-clear { font-size: 12px; }
        .tx-count { color: #9fb0e7; font-size: 13px; margin-left: auto; }
        #tx-list {
            border-radius: 14px;
            border: 1px solid rgba(109, 127, 206, 0.3);
            background: linear-gradient(160deg, rgba(18, 28, 59, 0.92), rgba(12, 18, 40, 0.95));
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        #tx-list table { margin: 0; }
        #tx-list th { background: rgba(38, 53, 102, 0.6); color: #b8c5f1; }
        #tx-list td { border-bottom-color: rgba(96, 117, 191, 0.2); }
        .tx-row { cursor: pointer; }
        .tx-row:hover td { background: rgba(233,69,96,0.08) !important; }
        .status-success { color: var(--success); }
        .status-failed { color: var(--danger); }
        .status-review { color: #9c6dff; font-weight: bold; }
        .status-stall { color: #ff9800; font-weight: bold; }
        .status-running { color: var(--warning); }
        .status-queued { color: var(--text2); }
        .log-item { padding: 8px 12px; border-bottom: 1px solid rgba(96, 117, 191, 0.2); font-size: 13px; }
        .log-item.fail { background: rgba(244,67,54,0.08); }
        .log-item .step-info { display: flex; justify-content: space-between; }
        .screenshot-btn { cursor: pointer; color: var(--accent); text-decoration: underline; font-size: 12px; }
        .modal-img { max-width: 100%; border-radius: 8px; }
        #detail-modal .modal {
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            overscroll-behavior: contain;
            border-radius: 14px;
            border: 1px solid rgba(109, 127, 206, 0.3);
            background: linear-gradient(160deg, rgba(18, 28, 59, 0.95), rgba(12, 18, 40, 0.98));
        }
        #detail-modal .modal h3 { margin-top: 0; }
        #detail-logs-container {
            max-height: 45vh;
            overflow-y: auto;
            overscroll-behavior: contain;
            border: 1px solid rgba(96, 117, 191, 0.3);
            border-radius: 10px;
            margin-top: 8px;
            background: rgba(7, 14, 33, 0.65);
        }
        .detail-head { display: flex; justify-content: space-between; align-items: center; }
        .detail-info { margin: 12px 0; font-size: 13px; }
        .detail-subtitle { margin: 12px 0 4px; }
        .detail-grid { gap: 8px; }
        .detail-error { margin-top: 8px; color: var(--danger); }
        .detail-ocr { font-size: 12px; color: var(--text2); margin-top: 4px; }
        .detail-msg { font-size: 12px; color: var(--danger); margin-top: 4px; }
        .empty-tip { color: var(--text2); padding: 12px; }
        .screen-modal {
            max-width: 500px;
            text-align: center;
            border-radius: 14px;
            border: 1px solid rgba(109, 127, 206, 0.3);
            background: linear-gradient(160deg, rgba(18, 28, 59, 0.95), rgba(12, 18, 40, 0.98));
        }
        .screen-modal-footer { margin-top: 12px; }
    </style>
</head>
<body>
    <div class="app-shell">
    <div id="nav"></div>
    <div class="container">
        <div class="page-head">
            <p class="page-kicker">Operations Console</p>
            <h2 class="page-title">Transactions</h2>
            <p class="page-subtitle">Review transaction lifecycle, status, and execution logs.</p>
        </div>

        <div class="filters">
            <select id="filter-status">
                <option value="">All Status</option>
                <option value="queued">Queued</option>
                <option value="running">Running</option>
                <option value="success">Success</option>
                <option value="failed">Failed</option>
                <option value="stall">Stall</option>
            </select>
            <select id="filter-bank"><option value="">From Bank</option></select>
            <select id="filter-to-bank"><option value="">To Bank</option></select>
            <select id="filter-arm"><option value="">All Arms</option></select>
            <input type="date" id="filter-date-from" title="From date">
            <input type="date" id="filter-date-to" title="To date">
            <select id="filter-pagesize" title="Rows per page">
                <option value="50">50</option>
                <option value="100" selected>100</option>
                <option value="200">200</option>
                <option value="500">500</option>
                <option value="">All</option>
            </select>
            <button class="btn btn-primary" onclick="loadTransactions()">Filter</button>
            <button class="btn btn-secondary btn-clear" onclick="clearFilters()">Clear</button>
            <span id="tx-count" class="tx-count"></span>
        </div>

        <div id="tx-list">
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Process ID</th><th>Arm</th><th>From</th><th>To</th><th>Amount</th>
                        <th>Status</th><th>Created</th><th>Duration</th>
                    </tr>
                </thead>
                <tbody id="tx-body"></tbody>
            </table>
        </div>

    </div>
    </div>

    <div class="modal-overlay" id="detail-modal">
        <div class="modal">
            <div class="detail-head">
                <h3 id="detail-title">Transaction Detail</h3>
                <button class="btn btn-sm btn-secondary" onclick="closeDetail()">Close</button>
            </div>
            <div id="detail-info" class="detail-info"></div>
            <h4 class="detail-subtitle">Step Logs</h4>
            <div id="detail-logs-container">
                <div id="detail-logs"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="screenshot-modal">
        <div class="modal screen-modal">
            <img id="screenshot-img" class="modal-img" />
            <div class="screen-modal-footer">
                <button class="btn btn-secondary" onclick="closeScreenshot()">Close</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="resend-modal">
        <div class="modal" style="max-width:520px;max-height:85vh;overflow-y:auto;overscroll-behavior:contain;">
            <style>
                /* Local override: defeat the global `input{width:100%}` rule
                   from style.css so radio buttons / checkboxes render at their
                   natural ~16x16 size and stay left-aligned next to the label. */
                #resend-modal input[type="radio"],
                #resend-modal input[type="checkbox"] {
                    width: auto;
                    margin: 0;
                    flex-shrink: 0;
                }
                #resend-modal .resend-choice {
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    padding: 6px 0;
                    cursor: pointer;
                    font-size: 13px;
                }
                #resend-modal .resend-checkbox-row {
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    padding: 4px 0;
                    cursor: pointer;
                    font-size: 13px;
                }
            </style>
            <div class="detail-head">
                <h3 style="margin-top:0;">Resend PAS Callback</h3>
                <button class="btn btn-sm btn-secondary" onclick="closeResend()">Close</button>
            </div>
            <div id="resend-body"></div>
            <div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;">
                <button class="btn btn-secondary" onclick="closeResend()">Cancel</button>
                <button id="resend-submit" class="btn btn-primary" onclick="submitResend()">Resend Callback</button>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
    async function loadFilters() {
        const [apps, arms] = await Promise.all([
            API.get('/api/banks/apps'),
            API.get('/api/stations/arms'),
        ]);
        const banks = [...new Set((Array.isArray(apps) ? apps : []).map(a => a.bank_code))].sort();
        document.getElementById('filter-bank').innerHTML = '<option value="">From Bank</option>' +
            banks.map(b => `<option value="${b}">${b}</option>`).join('');
        const mappings = await API.get('/api/banks/mappings');
        const toBanks = [...new Set((Array.isArray(mappings) ? mappings : []).map(m => m.to_bank_code))].sort();
        document.getElementById('filter-to-bank').innerHTML = '<option value="">To Bank</option>' +
            toBanks.map(b => `<option value="${b}">${b}</option>`).join('');
        document.getElementById('filter-arm').innerHTML = '<option value="">All Arms</option>' +
            (Array.isArray(arms) ? arms : []).map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    }

    function clearFilters() {
        document.getElementById('filter-status').value = '';
        document.getElementById('filter-bank').value = '';
        document.getElementById('filter-to-bank').value = '';
        document.getElementById('filter-arm').value = '';
        document.getElementById('filter-date-from').value = '';
        document.getElementById('filter-date-to').value = '';
        document.getElementById('filter-pagesize').value = '100';
        loadTransactions();
    }

    async function loadTransactions() {
        const status = document.getElementById('filter-status').value;
        const bank = document.getElementById('filter-bank').value;
        const toBank = document.getElementById('filter-to-bank').value;
        const arm = document.getElementById('filter-arm').value;
        const dateFrom = document.getElementById('filter-date-from').value;
        const dateTo = document.getElementById('filter-date-to').value;
        const pageSize = document.getElementById('filter-pagesize').value;
        const params = pageSize ? ['limit=' + pageSize] : ['limit=0'];
        params.push('tz=' + getDisplayTZ());
        if (status) params.push('status=' + status);
        if (bank) params.push('bank=' + bank);
        if (toBank) params.push('to_bank=' + toBank);
        if (arm) params.push('arm_id=' + arm);
        if (dateFrom) params.push('date_from=' + dateFrom);
        if (dateTo) params.push('date_to=' + dateTo);
        const url = '/api/monitor/transactions?' + params.join('&');
        const rows = await API.get(url);
        const tbody = document.getElementById('tx-body');
        document.getElementById('tx-count').textContent = (Array.isArray(rows) ? rows.length : 0) + ' transactions';

        tbody.innerHTML = (Array.isArray(rows) ? rows : []).map(tx => {
            const dur = tx.started_at && tx.finished_at
                ? Math.round((new Date(tx.finished_at) - new Date(tx.started_at)) / 1000) + 's'
                : '-';
            return `<tr class="tx-row" onclick="showDetail(${tx.id})">
                <td>${tx.id}</td>
                <td>${tx.process_id}</td>
                <td>${tx.arm_name || '-'}</td>
                <td><strong>${tx.pay_from_bank_code}</strong></td>
                <td>${tx.pay_to_bank_code || '-'}</td>
                <td>$${tx.amount}</td>
                <td><span class="status-${tx.status}">${tx.status}</span></td>
                <td>${formatTZ(tx.created_at)}</td>
                <td>${dur}</td>
            </tr>`;
        }).join('') || '<tr><td colspan="8" class="empty-tip">No transactions</td></tr>';
    }

    async function showDetail(id) {
        const [tx, logs] = await Promise.all([
            API.get(`/api/monitor/transactions/${id}`),
            API.get(`/api/monitor/transactions/${id}/logs`)
        ]);
        document.getElementById('detail-title').textContent = `Transaction #${tx.id} — Process ${tx.process_id}`;

        // Callback row: shown for every transaction. Button text + style
        // depend on whether a callback was already sent. Disabled while the
        // transaction is still queued/running (no callback to send yet).
        const cbStatusHtml = tx.callback_sent_at
            ? `<span style="color:var(--success);">Sent ${formatTZ(tx.callback_sent_at)}</span>`
            : `<span style="color:var(--warning);">Not sent yet</span>`;
        const isFinished = tx.status !== 'queued' && tx.status !== 'running';
        const btnLabel = tx.callback_sent_at ? 'Resend Callback' : 'Send Callback';
        const btnClass = tx.callback_sent_at ? 'btn-secondary' : 'btn-primary';
        const btnAttrs = isFinished ? '' : 'disabled title="Transaction not finished"';

        document.getElementById('detail-info').innerHTML = `
            <div class="grid grid-4 detail-grid">
                <div><label>From</label><div>${tx.pay_from_bank_code}</div></div>
                <div><label>To</label><div>${tx.pay_to_bank_code || '-'}</div></div>
                <div><label>Amount</label><div>$${tx.amount}</div></div>
                <div><label>Status</label><div class="status-${tx.status}">${tx.status}</div></div>
                <div><label>To Account</label><div>${tx.pay_to_account_no}</div></div>
                <div><label>Created</label><div>${formatTZ(tx.created_at)}</div></div>
                <div><label>Started</label><div>${formatTZ(tx.started_at)}</div></div>
                <div><label>Finished</label><div>${formatTZ(tx.finished_at)}</div></div>
                <div><label>To Name</label><div>${tx.pay_to_account_name || '-'}</div></div>
                <div class="full"><label>Callback</label>
                    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                        ${cbStatusHtml}
                        <button class="btn btn-sm ${btnClass}" ${btnAttrs}
                                onclick="openResendDialog(${tx.id})">${btnLabel}</button>
                    </div>
                </div>
            </div>
            ${tx.error_message ? '<div class="detail-error">Error: ' + tx.error_message + '</div>' : ''}
        `;
        document.getElementById('detail-logs').innerHTML = logs.map(l => `
            <div class="log-item ${l.result === 'fail' ? 'fail' : ''}">
                <div class="step-info">
                    <span><strong>${l.step_number}.</strong> ${l.step_name} (${l.action_type})</span>
                    <span>${l.result === 'ok' ? '✓' : '✗'} ${l.duration_ms ? l.duration_ms + 'ms' : ''}</span>
                </div>
                ${l.ocr_text ? '<div class="detail-ocr">OCR: ' + l.ocr_text.substring(0,100) + '</div>' : ''}
                ${l.message ? '<div class="detail-msg">' + l.message.substring(0,200) + '</div>' : ''}
                ${l.has_screenshot ? '<span class="screenshot-btn" onclick="showScreenshot(' + tx.id + ',' + l.id + ')">Screenshot</span>' : ''}
            </div>
        `).join('') || '<div class="empty-tip">No logs</div>';

        document.getElementById('detail-modal').classList.add('active');
    }

    function closeDetail() {
        document.getElementById('detail-modal').classList.remove('active');
    }

    function closeScreenshot() {
        document.getElementById('screenshot-modal').classList.remove('active');
    }

    async function showScreenshot(txId, logId) {
        const data = await API.get(`/api/monitor/transactions/${txId}/logs/${logId}/screenshot`);
        if (data.screenshot) {
            document.getElementById('screenshot-img').src = 'data:image/jpeg;base64,' + data.screenshot;
            document.getElementById('screenshot-modal').classList.add('active');
        } else {
            toast('No screenshot available', 'error');
        }
    }

    // === PAS callback resend ============================================
    // Manual recovery for transactions whose auto callback chain failed
    // (3 retries with 5s/15s/30s backoff in pas_client.callback_result),
    // OR for cases where the operator wants to flip a misclassified status
    // based on inspecting the receipt photo.
    let resendCtx = null;  // {tx_id, current_db_status} during dialog lifetime

    async function openResendDialog(txId) {
        // Re-fetch the tx so the dialog reflects the latest DB state (status
        // may have changed in another tab since the detail modal opened).
        const tx = await API.get(`/api/monitor/transactions/${txId}`);
        if (!tx || tx.error) {
            toast('Failed to load transaction: ' + (tx?.error || 'unknown'), 'error');
            return;
        }
        resendCtx = { tx_id: txId, current_status: tx.status };

        const dbToCode = { success: 1, failed: 2, review: 3, stall: 4 };
        const currentCode = dbToCode[tx.status] || 4;
        const hasReceipt = !!tx.receipt_base64;
        const receiptHtml = hasReceipt
            ? `<img src="data:image/jpeg;base64,${tx.receipt_base64}" style="max-width:100%;border-radius:8px;border:1px solid rgba(96,117,191,0.3);"/>`
            : '<div class="empty-tip">No receipt photo on file for this transaction.</div>';

        const statusOptions = [
            [1, 'success', 'Bank confirmed transfer'],
            [2, 'failed',  'Bank rejected'],
            [3, 'review',  'Bank pending / in review'],
            [4, 'stall',   'Automation broke before / during transfer'],
        ];

        document.getElementById('resend-body').innerHTML = `
            <div style="font-size:13px;margin-bottom:10px;color:var(--text2);">
                Transaction <strong style="color:var(--text);">#${tx.id}</strong> &middot;
                Process <strong style="color:var(--text);">${tx.process_id}</strong> &middot;
                Current DB status: <strong class="status-${tx.status}">${tx.status}</strong>
                ${tx.callback_sent_at
                    ? `<br><span style="font-size:11px;">Last callback sent at ${formatTZ(tx.callback_sent_at)}</span>`
                    : `<br><span style="font-size:11px;color:var(--warning);">Callback never sent for this transaction.</span>`
                }
            </div>
            <div style="margin-bottom:14px;">${receiptHtml}</div>
            <div style="margin-bottom:12px;">
                <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:6px;">
                    Re-send as which status?
                </label>
                ${statusOptions.map(([code, label, help]) => `
                    <label class="resend-choice">
                        <input type="radio" name="resend-status" value="${code}" ${code === currentCode ? 'checked' : ''}>
                        <span>
                            <strong>${label}</strong>
                            <span style="color:var(--text2);">(status=${code})</span>
                            <span style="font-size:11px;color:var(--text2);margin-left:6px;">— ${help}</span>
                        </span>
                    </label>
                `).join('')}
            </div>
            <label class="resend-checkbox-row">
                <input type="checkbox" id="resend-include-receipt" ${hasReceipt ? 'checked' : 'disabled'}>
                <span>Include receipt photo with callback${hasReceipt ? '' : ' (no receipt available)'}</span>
            </label>
            <label class="resend-checkbox-row">
                <input type="checkbox" id="resend-update-db" checked>
                <span>Update DB status if different from current</span>
            </label>
        `;
        document.getElementById('resend-modal').classList.add('active');
    }

    function closeResend() {
        document.getElementById('resend-modal').classList.remove('active');
        resendCtx = null;
    }

    async function submitResend() {
        if (!resendCtx) return;
        const radio = document.querySelector('input[name="resend-status"]:checked');
        if (!radio) { toast('Please choose a status', 'error'); return; }
        const status = parseInt(radio.value);
        const include_receipt = document.getElementById('resend-include-receipt').checked;
        const update_db_status = document.getElementById('resend-update-db').checked;

        const btn = document.getElementById('resend-submit');
        const originalLabel = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Sending...';
        try {
            const r = await API.post(
                `/api/monitor/transactions/${resendCtx.tx_id}/resend-callback`,
                { status, include_receipt, update_db_status });
            if (r.ok) {
                toast(r.db_status_changed
                    ? `Callback sent. DB status updated to '${r.new_db_status}'.`
                    : 'Callback sent successfully.', 'success');
                const txId = resendCtx.tx_id;
                closeResend();
                // Refresh both detail (so new callback_sent_at + status show) and
                // the list (so the row reflects the new state).
                showDetail(txId);
                loadTransactions();
            } else {
                toast('Resend failed: ' + (r.error || 'unknown error'), 'error');
            }
        } catch (e) {
            toast('Network error: ' + e.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = originalLabel;
        }
    }

    // Click outside the modal content (on overlay) closes the modal.
    document.getElementById('detail-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeDetail();
    });
    document.getElementById('screenshot-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeScreenshot();
    });
    document.getElementById('resend-modal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeResend();
    });

    // ESC closes the topmost open modal. Stack order: screenshot > resend > detail.
    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        if (document.getElementById('screenshot-modal').classList.contains('active')) {
            closeScreenshot();
        } else if (document.getElementById('resend-modal').classList.contains('active')) {
            closeResend();
        } else if (document.getElementById('detail-modal').classList.contains('active')) {
            closeDetail();
        }
    });

    // When user toggles GMT+7/+8 in nav, re-fetch + re-render so the visible
    // timestamps switch immediately. Cheaper than a full page reload because
    // it preserves filter state and scroll position.
    window.addEventListener('displaytz:changed', () => {
        loadTransactions();
    });

    loadFilters();
    loadTransactions();
    </script>
</body>
</html>
