<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Unified System</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        html, body { min-height: 100%; }
        body {
            background:
                radial-gradient(1200px 700px at 10% -10%, rgba(120, 88, 255, 0.22), transparent 50%),
                radial-gradient(900px 600px at 90% 0%, rgba(50, 186, 255, 0.18), transparent 50%),
                #0a1020;
            color: #e8ecff;
            overflow-x: hidden;
        }
        .app-shell {
            width: 111.1112%;
            transform: scale(0.9);
            transform-origin: top left;
        }
        .container { max-width: 1520px; padding-top: 20px; }
        .dash-hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            padding: 0;
            border: 0;
            background: transparent;
            box-shadow: none;
        }
        .dash-kicker {
            margin: 0 0 6px;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #93a7ff;
        }
        .dash-subtitle {
            margin: 6px 0 0;
            color: #acb6de;
            font-size: 13px;
        }
        .page-title { margin-bottom: 20px; }
        .dash-hero .page-title { margin-bottom: 0; font-size: 27px; letter-spacing: 0.01em; }
        .section-title { margin-top: 24px; margin-bottom: 12px; color: #d4dcff; font-size: 18px; }
        .full-span-center-muted { grid-column: 1 / -1; text-align: center; color: var(--text2); }
        .panel-card { margin-top: 24px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .panel-header h3 { margin: 0; }
        .panel-actions { display: flex; gap: 8px; align-items: center; }
        .select-compact { width: auto; min-width: 120px; }
        .stats-grid .card-stat {
            border-radius: 14px;
            border-color: rgba(110, 128, 212, 0.32);
            background: linear-gradient(160deg, rgba(22, 34, 72, 0.9), rgba(16, 24, 52, 0.92));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .stats-grid .card-stat .num { font-size: 34px; letter-spacing: 0.02em; }
        .stats-grid .card-stat .label { color: #98a8dd; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
        .stat-total { border-left: 3px solid #a06bff; }
        .stat-success { border-left: 3px solid #4caf50; }
        .stat-failed { border-left: 3px solid #f44336; }
        .stat-stall { border-left: 3px solid #ff9800; }
        .stat-queue { border-left: 3px solid #ffbf47; }
        .log-terminal {
            background: #0b1327;
            border: 1px solid #2f3d66;
            border-radius: 12px;
            padding: 12px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        .log-line {
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid transparent;
        }
        .log-line:hover { background: rgba(130, 149, 220, 0.08); border-color: rgba(130, 149, 220, 0.16); }
        .log-prefix { color: #8b949e; }
        .log-ts { color: #484f58; }
        .log-lvl { font-weight: 600; }
        .card-stat .num.stat-num-success { color: var(--success); }
        .card-stat .num.stat-num-failed { color: var(--danger); }
        .card-stat .num.stat-num-stall { color: #ff9800; }
        .card-stat .num.stat-num-queue { color: var(--warning); }
        .arm-extra { font-size: 11px; color: var(--text2); margin-top: 4px; }
        .arm-error { font-size: 11px; color: var(--danger); margin-top: 4px; }
        .cam-loading { text-align: center; color: var(--text2); padding: 24px 4px; }
        .arm-grid .card.arm-card {
            padding: 16px;
            min-height: 154px;
            position: relative;
            border-radius: 14px;
            border: 1px solid rgba(109, 127, 206, 0.28);
            background: linear-gradient(160deg, rgba(20, 31, 64, 0.9), rgba(12, 19, 40, 0.95));
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
        }
        .arm-card-idle { border-left: 3px solid rgba(76, 175, 80, 0.9); }
        .arm-card-busy { border-left: 3px solid rgba(255, 152, 0, 0.95); }
        .arm-card-paused { border-left: 3px solid rgba(244, 67, 54, 0.9); }
        .arm-card-offline, .arm-card-no_worker { border-left: 3px solid rgba(244, 67, 54, 0.75); opacity: 0.92; }
        .arm-card .arm-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: #e6ecff; }
        .arm-card .arm-meta { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
        .arm-card .arm-status { font-size: 14px; margin-bottom: 6px; color: #dbe3ff; }
        .arm-card .arm-task { font-size: 12px; color: #9fb0e7; min-height: 32px; line-height: 1.5; }
        .arm-card .arm-controls { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08), 0 0 12px currentColor;
        }
        .dot-idle { background: var(--success); }
        .dot-busy { background: var(--warning); animation: pulse 1.5s infinite; }
        .dot-offline, .dot-paused, .dot-no_worker { background: var(--danger); }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
        .arm-controls .btn {
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .btn-warning { background: var(--warning); color: #111; }
        .btn-warning:hover { background: #e68a00; }
        .cam-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #9fb0e7; margin-bottom: 8px; }
        .cam-row .cam-btn { padding: 1px 8px; font-size: 11px; line-height: 1.4; cursor: pointer; background: rgba(255,255,255,0.02); border: 1px solid rgba(135, 150, 212, 0.45); color: #c5d2ff; border-radius: 999px; }
        .cam-row .cam-btn:hover { color: var(--accent); border-color: var(--accent); }
        .cam-row .cam-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .cam-panel { background: #0d162f; border: 1px solid #31416d; border-radius: 10px; padding: 8px; margin-bottom: 10px; font-size: 11px; }
        .cam-panel img { width: 100%; max-height: 160px; object-fit: contain; border-radius: 4px; background: #000; }
        .cam-panel .cam-hint { color: #a6b7ea; margin: 6px 0; line-height: 1.4; }
        .cam-panel .cam-swap-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
        .cam-panel select { font-size: 11px; padding: 2px 4px; flex: 1; min-width: 0; }
        .cam-panel .cam-err { color: var(--danger); padding: 12px 4px; text-align: center; }
        .panel-card {
            border-radius: 14px;
            border-color: rgba(109, 127, 206, 0.3);
            background: linear-gradient(160deg, rgba(18, 28, 59, 0.92), rgba(12, 18, 40, 0.95));
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }
        .panel-header { margin-bottom: 12px; }
        .panel-header h3 { color: #dee6ff; }
        .full-span-center-muted {
            color: #9fb0e7;
            border-style: dashed;
            border-color: rgba(140, 156, 224, 0.34);
            background: rgba(14, 24, 49, 0.55);
            border-radius: 14px;
        }
        @media (max-width: 980px) {
            .dash-hero { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
    <div id="nav"></div>
    <div class="container">
        <header class="dash-hero">
            <div>
                <p class="dash-kicker">Operations Console</p>
                <h2 class="page-title">Dashboard</h2>
                <p class="dash-subtitle">Real-time machine health, task flow, and diagnostics in one place.</p>
            </div>
        </header>

        <div class="grid grid-5 stats-grid" id="stats"></div>

        <h3 class="section-title">Machine Status</h3>
        <div class="grid grid-4 arm-grid" id="arm-cards">
            <div class="card full-span-center-muted">Connecting...</div>
        </div>

        <!-- Live Log Terminal -->
        <div class="card panel-card">
            <div class="panel-header">
                <h3>Live Logs</h3>
                <div class="panel-actions">
                    <select id="log-arm-select" onchange="switchLogArm()" class="select-compact">
                        <option value="">All Arms</option>
                    </select>
                    <button class="btn btn-sm btn-secondary" onclick="clearLogs()">Clear</button>
                </div>
            </div>
            <div id="log-terminal" class="log-terminal"></div>
        </div>




    </div>
    </div>
    <script src="/static/js/api.js"></script>
    <script>
    let ws = null;

    async function loadStats() {
        let s;
        try { s = await API.get('/api/monitor/stats/today'); }
        catch (e) { return; }
        if (!s || s.error) return;
        document.getElementById('stats').innerHTML = `
            <div class="card card-stat stat-total"><div class="num">${s.total || 0}</div><div class="label">Today Total</div></div>
            <div class="card card-stat stat-success"><div class="num stat-num-success">${s.success || 0}</div><div class="label">Success</div></div>
            <div class="card card-stat stat-failed"><div class="num stat-num-failed">${s.failed || 0}</div><div class="label">Failed</div></div>
            <div class="card card-stat stat-stall"><div class="num stat-num-stall">${s.stall || 0}</div><div class="label">Stall</div></div>
            <div class="card card-stat stat-queue"><div class="num stat-num-queue">${s.queued || 0}</div><div class="label">In Queue</div></div>
        `;
    }

    async function load() {
        await loadStats();
        setInterval(loadStats, 5000);
        connectWS();
    }

    function connectWS() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}/api/monitor/ws`);
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            renderArmCards(data.arms, data.queued);
        };
        ws.onclose = () => { setTimeout(connectWS, 3000); };
        ws.onerror = () => { ws.close(); };
    }

    function getEffectiveStatus(arm) {
        if (!arm.active) return 'offline';
        if (arm.worker_status === 'no_worker') return 'no_worker';
        return arm.worker_status;
    }

    let lastArms = [];

    function renderArmCards(arms, queued) {
        // Dashboard only shows arms with active=true. Inactive arms are hidden
        // here (still visible in Settings for admin); flip via Settings to
        // re-enable. This keeps the operations view focused on machines that
        // are actually in service.
        arms = (arms || []).filter(a => a.active);
        if (arms.length > 0) updateLogArmSelect(arms);
        lastArms = arms;
        const cards = document.getElementById('arm-cards');
        if (arms.length === 0) {
            cards.innerHTML = '<div class="card full-span-center-muted">No active machines. <a href="/settings">Activate one in Settings</a>.</div>';
            return;
        }
        cards.innerHTML = arms.map(a => {
            const st = getEffectiveStatus(a);
            const stLabel = {idle:'IDLE', busy:'BUSY', paused:'PAUSED', offline:'OFFLINE', no_worker:'NO WORKER'}[st] || st.toUpperCase();
            const camSafe = (st !== 'busy');
            let btns = '';
            if (st === 'idle' || st === 'busy') {
                btns += `<button class="btn btn-sm btn-secondary" onclick="armAction('pause',${a.arm_id})">Pause</button>`;
                btns += `<button class="btn btn-sm btn-warning" onclick="armAction('offline',${a.arm_id})">Set Offline</button>`;
            }
            if (st === 'paused') {
                btns += `<button class="btn btn-sm btn-success" onclick="armAction('resume',${a.arm_id})">Resume</button>`;
                btns += `<button class="btn btn-sm btn-warning" onclick="armAction('offline',${a.arm_id})">Set Offline</button>`;
            }
            if (st === 'offline' || st === 'no_worker') {
                btns += `<button class="btn btn-sm btn-success" onclick="armAction('resume',${a.arm_id})">Resume</button>`;
            }
            btns += `<button class="btn btn-sm btn-danger" onclick="armAction('reset',${a.arm_id})">Reset</button>`;

            const camBtnTitle = camSafe ? 'Verify physical camera matches this arm' : 'Arm is busy — wait for current task to finish';
            const camBtnDisabled = camSafe ? '' : 'disabled';
            const camRow = `<div class="cam-row">
                <span>${a.com_port} | Camera ${a.camera_id}</span>
                <button class="cam-btn" ${camBtnDisabled} title="${camBtnTitle}" onclick="toggleCamPanel(${a.arm_id})">&#x21bb; Verify</button>
            </div>`;

            return `<div class="card arm-card arm-card-${st}" id="arm-card-${a.arm_id}">
                <div class="arm-name">${a.name}</div>
                ${camRow}
                <div id="cam-panel-${a.arm_id}"></div>
                <div class="arm-status">
                    <span class="status-dot dot-${st}"></span>
                    <strong>${stLabel}</strong>
                </div>
                <div class="arm-task">
                    ${a.current_task ? 'Task: ' + a.current_task : 'No active task'}
                    ${a.current_step ? '<br>Step: ' + a.current_step : ''}
                </div>
                <div class="arm-extra">Completed: ${a.task_count}</div>
                ${a.last_error ? '<div class="arm-error">' + a.last_error.substring(0,80) + '</div>' : ''}
                <div class="arm-controls">${btns}</div>
            </div>`;
        }).join('');

        if (camPanelOpen.size > 0) {
            camPanelOpen.forEach(armId => {
                const stillExists = arms.find(a => a.arm_id === armId);
                if (stillExists) renderCamPanel(armId);
                else camPanelOpen.delete(armId);
            });
        }

        if (!sessionStorage.getItem('cam_verify_shown')) {
            sessionStorage.setItem('cam_verify_shown', '1');
            const safeArms = arms.filter(a => getEffectiveStatus(a) !== 'busy');
            if (safeArms.length > 0) {
                safeArms.forEach(a => toggleCamPanel(a.arm_id));
            }
        }
    }

    /* ============ CAMERA VERIFY / SWAP ============
       Preview is captured ONCE per Verify click and cached, so the 2s WS
       re-render of arm-cards just repaints from the cache instead of
       hammering /camera-preview (which would open+close the camera every
       2s — that was a bug). Force a fresh capture only on:
       - first click of Verify
       - manual refresh button (↻)
       - after a successful swap
    */
    const camPanelOpen = new Set();
    const camPreviewCache = new Map();

    function toggleCamPanel(armId) {
        if (camPanelOpen.has(armId)) {
            camPanelOpen.delete(armId);
            camPreviewCache.delete(armId);
            const el = document.getElementById('cam-panel-' + armId);
            if (el) el.innerHTML = '';
            return;
        }
        camPanelOpen.add(armId);
        renderCamPanel(armId, true);
    }

    function _paintCamPanel(armId, result) {
        const el = document.getElementById('cam-panel-' + armId);
        if (!el) return;
        const arm = lastArms.find(a => a.arm_id === armId);
        if (!arm) return;

        const others = lastArms.filter(o => {
            if (o.arm_id === armId) return false;
            return getEffectiveStatus(o) !== 'busy';
        });
        const swapOptions = others.length
            ? others.map(o => `<option value="${o.arm_id}">${o.name} (cam ${o.camera_id})</option>`).join('')
            : '<option value="" disabled>No non-busy arm to swap with</option>';

        let body;
        if (!result) {
            body = `<div class="cam-loading">Loading camera ${arm.camera_id}…</div>`;
        } else if (result.success) {
            body = `<img src="data:image/jpeg;base64,${result.image}" alt="Camera ${result.camera_id}">`;
        } else {
            body = `<div class="cam-err">${result.error || 'Preview failed'}</div>`;
        }

        el.innerHTML = `<div class="cam-panel">
            ${body}
            <div class="cam-hint">Does this view match <b>${arm.name}</b>'s physical position?</div>
            <div class="cam-swap-row">
                <select id="cam-swap-sel-${armId}" ${others.length ? '' : 'disabled'}>${swapOptions}</select>
                <button class="cam-btn" ${others.length ? '' : 'disabled'} onclick="doSwap(${armId})">Swap</button>
                <button class="cam-btn" onclick="renderCamPanel(${armId}, true)" title="Recapture">&#x21bb;</button>
                <button class="cam-btn" onclick="toggleCamPanel(${armId})">&times;</button>
            </div>
        </div>`;
    }

    async function renderCamPanel(armId, forceRefresh) {
        if (!camPanelOpen.has(armId)) return;
        if (!forceRefresh && camPreviewCache.has(armId)) {
            _paintCamPanel(armId, camPreviewCache.get(armId));
            return;
        }
        _paintCamPanel(armId, null);
        let r;
        try { r = await API.get(`/api/monitor/arms/${armId}/camera-preview`); }
        catch (e) { r = { success: false, error: 'Network error' }; }
        if (!camPanelOpen.has(armId)) return;
        camPreviewCache.set(armId, r);
        _paintCamPanel(armId, r);
    }

    /* Wait until both arms' workers are back up after restart_worker.
       Polls lastArms (refreshed by 2s WS push) at 500ms intervals.

       Ready states are whitelisted instead of blacklisted so the check
       aligns with ArmWorker.get_status()'s enum-like return values:
         idle   — _running=True, no task, no pause
         busy   — _running=True, has current task
         paused — _running=True, explicitly paused
       These three imply camera_enable() has completed in run(). States
       outside this set ('offline' when _running=False, 'no_worker' when
       the arm is missing from manager.workers) are NOT ready.

       Caps wait at maxMs to avoid hanging the UI if something breaks. */
    const WORKER_READY_STATES = new Set(['idle', 'busy', 'paused']);
    async function _waitForWorkerReady(armIds, maxMs = 8000) {
        const t0 = Date.now();
        while (Date.now() - t0 < maxMs) {
            const allReady = armIds.every(id => {
                const arm = lastArms.find(a => a.arm_id === id);
                return arm && WORKER_READY_STATES.has(arm.worker_status);
            });
            if (allReady) return true;
            await new Promise(r => setTimeout(r, 500));
        }
        return false;
    }

    async function doSwap(armId) {
        const sel = document.getElementById('cam-swap-sel-' + armId);
        if (!sel || !sel.value) return;
        const targetId = parseInt(sel.value);
        const a = lastArms.find(x => x.arm_id === armId);
        const b = lastArms.find(x => x.arm_id === targetId);
        const stA = getEffectiveStatus(a), stB = getEffectiveStatus(b);
        const restartNote = (stA === 'idle' || stB === 'idle')
            ? '\n\nNote: idle worker(s) will be briefly restarted. Queued tasks are preserved.'
            : '';
        if (!confirm(`Swap camera between ${a.name} (cam ${a.camera_id}) and ${b.name} (cam ${b.camera_id})?${restartNote}`)) return;
        const r = await API.post('/api/monitor/arms/swap-camera', { arm_id_a: armId, arm_id_b: targetId });
        if (!r.success) {
            toast(r.error || 'Swap failed', 'error');
            return;
        }
        toast('Cameras swapped — workers restarting…');
        camPreviewCache.delete(armId);
        camPreviewCache.delete(targetId);
        if (camPanelOpen.has(armId)) _paintCamPanel(armId, null);
        await _waitForWorkerReady([armId, targetId], 8000);
        if (camPanelOpen.has(armId)) await renderCamPanel(armId, true);
    }

    async function armAction(action, armId) {
        if (action === 'offline' && !confirm('Set this arm offline?')) return;
        if (action === 'reset' && !confirm('Reset arm to origin and close port?')) return;
        const r = await API.post(`/api/monitor/${action}/${armId}`);
        if (r.success) toast(action.charAt(0).toUpperCase() + action.slice(1) + ' done');
        else toast(r.error || 'Failed', 'error');
    }

    // === Live Log Terminal ===
    let logWs = null;
    let currentLogArm = '';
    const logColors = { INFO: '#58a6ff', WARNING: '#d29922', ERROR: '#f85149', DEBUG: '#8b949e' };

    function connectLogWS() {
        if (logWs) { try { logWs.close(); } catch(e) {} }
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const armParam = currentLogArm ? `?arm_id=${currentLogArm}` : '';
        logWs = new WebSocket(`${proto}//${location.host}/api/monitor/logs/ws${armParam}`);
        logWs.onmessage = (e) => {
            const logs = JSON.parse(e.data);
            const term = document.getElementById('log-terminal');
            logs.forEach(l => {
                const color = logColors[l.level] || '#c9d1d9';
                const prefix = l.arm_name ? `<span class="log-prefix">[${l.arm_name}]</span> ` : '';
                const ts = `<span class="log-ts">${l.ts}</span>`;
                const lvl = `<span class="log-lvl" style="color:${color}">${l.level.padEnd(7)}</span>`;
                term.innerHTML += `<div class="log-line">${ts} ${lvl} ${prefix}${escHtml(l.msg)}</div>`;
            });
            if (logs.length > 0) term.scrollTop = term.scrollHeight;
        };
        logWs.onclose = () => { setTimeout(connectLogWS, 3000); };
        logWs.onerror = () => { logWs.close(); };
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function switchLogArm() {
        currentLogArm = document.getElementById('log-arm-select').value;
        document.getElementById('log-terminal').innerHTML = '';
        connectLogWS();
    }

    function clearLogs() {
        document.getElementById('log-terminal').innerHTML = '';
    }

    function updateLogArmSelect(arms) {
        const sel = document.getElementById('log-arm-select');
        const cur = sel.value;
        sel.innerHTML = '<option value="">All Arms</option>' +
            arms.map(a => `<option value="${a.arm_id}">${a.name}</option>`).join('');
        sel.value = cur;
    }

    load();
    connectLogWS();
    </script>
</body>
</html>
