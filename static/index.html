<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — WA System</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ── Page-specific overrides ── */
        .dash-hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 24px;
        }

        /* ── Stats grid ── */
        .stats-grid { margin-bottom: 24px; }
        .stats-grid .card-stat .num {
            font-size: 32px;
        }
        .stat-rate {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-2);
            margin-left: 4px;
            font-family: var(--font-mono);
        }

        /* ── Section header ── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-3);
        }

        /* ── Machine cards ── */
        .arm-grid { margin-bottom: 24px; }

        .arm-card {
            padding: 16px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background: var(--surface);
            transition: border-color 0.2s;
        }
        .arm-card:hover { border-color: var(--border-2); }

        .arm-card-idle    { border-left: 2px solid var(--success); }
        .arm-card-busy    { border-left: 2px solid var(--warning); }
        .arm-card-paused  { border-left: 2px solid var(--danger); }
        .arm-card-offline,
        .arm-card-no_worker { border-left: 2px solid var(--text-3); opacity: 0.7; }

        .arm-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .arm-name { font-size: 14px; font-weight: 700; color: var(--text); }
        .arm-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 3px 8px;
            border-radius: 4px;
            color: var(--text-2);
            background: var(--surface-2);
        }
        .arm-card-idle    .arm-status-badge { color: var(--success); background: var(--success-dim); }
        .arm-card-busy    .arm-status-badge { color: var(--warning); background: var(--warning-dim); }
        .arm-card-paused  .arm-status-badge { color: var(--danger);  background: var(--danger-dim); }
        .arm-card-offline .arm-status-badge,
        .arm-card-no_worker .arm-status-badge { color: var(--text-3); background: var(--surface-3); }

        .arm-meta {
            font-size: 11px;
            color: var(--text-3);
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .arm-meta .sep { opacity: 0.4; }

        .arm-task {
            font-size: 12px;
            color: var(--text-2);
            line-height: 1.5;
            min-height: 36px;
        }
        .arm-task strong { color: var(--text); }

        .arm-today {
            font-size: 11px;
            color: var(--text-3);
            font-family: var(--font-mono);
        }
        .arm-today .rate { color: var(--accent); }

        .arm-error {
            font-size: 11px;
            color: var(--danger);
            background: var(--danger-dim);
            padding: 4px 8px;
            border-radius: 4px;
            line-height: 1.4;
        }

        .arm-controls {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 2px;
        }

        /* ── Camera verify panel ── */
        .cam-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-3);
        }
        .cam-btn {
            padding: 2px 8px;
            font-size: 11px;
            cursor: pointer;
            background: var(--surface-3);
            border: 1px solid var(--border);
            color: var(--text-2);
            border-radius: var(--radius);
            font-family: inherit;
            transition: all 0.15s;
        }
        .cam-btn:hover { color: var(--text); border-color: var(--border-2); }
        .cam-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .cam-panel {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 10px;
            font-size: 11px;
        }
        .cam-panel img {
            width: 100%;
            max-height: 150px;
            object-fit: contain;
            border-radius: var(--radius);
            background: #000;
        }
        .cam-hint { color: var(--text-2); margin: 6px 0 4px; line-height: 1.4; }
        .cam-swap-row { display: flex; gap: 5px; align-items: center; margin-top: 6px; }
        .cam-swap-row select { font-size: 11px; padding: 3px 6px; flex: 1; min-width: 0; }
        .cam-err { color: var(--danger); padding: 16px 4px; text-align: center; }
        .cam-loading { text-align: center; color: var(--text-2); padding: 20px 4px; font-size: 11px; }

        /* ── Log terminal ── */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .panel-header h3 { margin-bottom: 0; }

        .log-terminal {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 10px;
            height: 280px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 11px;
            line-height: 1.7;
        }

        .log-line {
            padding: 1px 6px;
            border-radius: 4px;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .log-line:hover { background: rgba(255,255,255,0.03); }
        .log-ts  { color: var(--text-3); flex-shrink: 0; }
        .log-lvl { font-weight: 600; flex-shrink: 0; min-width: 52px; }
        .log-prefix { color: var(--text-3); }
        .log-msg { color: var(--text-2); word-break: break-all; }

        .select-compact { width: auto; min-width: 110px; padding: 4px 8px; font-size: 12px; }

        .full-span-center-muted {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-2);
            padding: 32px;
            border-style: dashed;
            font-size: 13px;
        }

        @media (max-width: 980px) {
            .dash-hero { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="nav"></div>
    <div class="container">

        <header class="dash-hero">
            <div class="page-head" style="margin-bottom:0">
                <p class="page-kicker">Operations Console</p>
                <h1 class="page-title">Dashboard</h1>
                <p class="page-subtitle">Real-time machine health, task flow, and diagnostics.</p>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-5 stats-grid" id="stats"></div>

        <!-- Machines -->
        <div class="section-header">
            <span class="section-label">Machines</span>
        </div>
        <div class="grid grid-4 arm-grid" id="arm-cards">
            <div class="card full-span-center-muted">Connecting…</div>
        </div>

        <!-- Live Log -->
        <div class="card">
            <div class="panel-header">
                <h3>Live Logs</h3>
                <div style="display:flex;gap:8px;align-items:center;">
                    <select id="log-arm-select" onchange="switchLogArm()" class="select-compact">
                        <option value="">All Arms</option>
                    </select>
                    <button class="btn btn-secondary btn-sm" onclick="clearLogs()">Clear</button>
                </div>
            </div>
            <div id="log-terminal" class="log-terminal"></div>
        </div>

    </div>

    <script src="/static/js/api.js"></script>
    <script>
    let ws = null;
    let lastPerArm = null;

    async function loadStats() {
        let s;
        try { s = await API.get('/api/monitor/stats/today?tz=' + getDisplayTZ()); }
        catch (e) { return; }
        if (!s || s.error) return;
        const finished = (s.success || 0) + (s.failed || 0) + (s.stall || 0);
        const pct = (n) => finished > 0 ? Math.round((n || 0) / finished * 100) : 0;
        document.getElementById('stats').innerHTML = `
            <div class="card card-stat stat-total">
                <div class="num">${s.total || 0}</div>
                <div class="label">Today Total</div>
            </div>
            <div class="card card-stat stat-success">
                <div class="num stat-num-success">${s.success || 0}<span class="stat-rate">${pct(s.success)}%</span></div>
                <div class="label">Success</div>
            </div>
            <div class="card card-stat stat-failed">
                <div class="num stat-num-failed">${s.failed || 0}<span class="stat-rate">${pct(s.failed)}%</span></div>
                <div class="label">Failed</div>
            </div>
            <div class="card card-stat stat-stall">
                <div class="num stat-num-stall">${s.stall || 0}<span class="stat-rate">${pct(s.stall)}%</span></div>
                <div class="label">Stall</div>
            </div>
            <div class="card card-stat stat-queue">
                <div class="num stat-num-queue">${s.queued || 0}</div>
                <div class="label">In Queue</div>
            </div>
        `;
        lastPerArm = s.per_arm || null;
        if (lastArms.length > 0) renderArmCards(lastArms, null);
    }

    async function load() {
        await loadStats();
        setInterval(loadStats, 5000);
        connectWS();
        window.addEventListener('displaytz:changed', loadStats);
    }

    function connectWS() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}/api/monitor/ws`);
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            renderArmCards(data.arms, data.queued);
        };
        ws.onclose = () => { setTimeout(connectWS, 3000); };
        ws.onerror = () => { ws.close(); };
    }

    function getEffectiveStatus(arm) {
        if (!arm.active) return 'offline';
        if (arm.worker_status === 'no_worker') return 'no_worker';
        return arm.worker_status;
    }

    let lastArms = [];

    function renderArmCards(arms, queued) {
        arms = (arms || []).filter(a => a.active);
        if (arms.length > 0) updateLogArmSelect(arms);
        lastArms = arms;
        const cards = document.getElementById('arm-cards');
        if (arms.length === 0) {
            cards.innerHTML = '<div class="card full-span-center-muted">No active machines. <a href="/settings">Activate one in Settings</a>.</div>';
            return;
        }

        cards.innerHTML = arms.map(a => {
            const st = getEffectiveStatus(a);
            const stLabel = {idle:'Idle', busy:'Busy', paused:'Paused', offline:'Offline', no_worker:'No Worker'}[st] || st;

            const camSafe = (st !== 'busy');
            const camBtnDisabled = camSafe ? '' : 'disabled';

            let btns = '';
            if (st === 'idle' || st === 'busy') {
                btns += `<button class="btn btn-sm btn-secondary" onclick="armAction('pause',${a.arm_id})">Pause</button>`;
                btns += `<button class="btn btn-sm btn-warning" onclick="armAction('offline',${a.arm_id})">Set Offline</button>`;
            }
            if (st === 'paused') {
                btns += `<button class="btn btn-sm btn-success" onclick="armAction('resume',${a.arm_id})">Resume</button>`;
                btns += `<button class="btn btn-sm btn-warning" onclick="armAction('offline',${a.arm_id})">Set Offline</button>`;
            }
            if (st === 'offline' || st === 'no_worker') {
                btns += `<button class="btn btn-sm btn-success" onclick="armAction('resume',${a.arm_id})">Resume</button>`;
            }
            btns += `<button class="btn btn-sm btn-danger" onclick="armAction('reset',${a.arm_id})">Reset</button>`;

            const todayStr = (() => {
                if (lastPerArm === null) return `Completed: ${a.task_count}`;
                const b = lastPerArm[a.arm_id] || {success: 0, total: 0};
                const rate = b.total > 0 ? Math.round(b.success / b.total * 100) : 0;
                return `Today: ${b.success}/${b.total} <span class="rate">(${rate}%)</span>`;
            })();

            return `<div class="card arm-card arm-card-${st}" id="arm-card-${a.arm_id}">
                <div class="arm-header">
                    <span class="arm-name">${a.name}</span>
                    <span class="arm-status-badge">
                        <span class="status-dot dot-${st}"></span>
                        ${stLabel}
                    </span>
                </div>
                <div class="arm-meta">
                    <span>${a.com_port}</span>
                    <span class="sep">·</span>
                    <span>Cam ${a.camera_id}</span>
                    <button class="cam-btn" ${camBtnDisabled} title="${camSafe ? 'Verify camera' : 'Arm busy'}" onclick="toggleCamPanel(${a.arm_id})" style="margin-left:4px;">⟳ Verify</button>
                </div>
                <div id="cam-panel-${a.arm_id}"></div>
                <div class="arm-task">
                    ${a.current_task ? `<strong>${a.current_task}</strong>` : '<span style="color:var(--text-3)">No active task</span>'}
                    ${a.current_step ? `<br><span style="color:var(--text-3)">Step: ${a.current_step}</span>` : ''}
                </div>
                ${a.last_error ? `<div class="arm-error">${a.last_error.substring(0,80)}</div>` : ''}
                <div class="arm-today">${todayStr}</div>
                <div class="arm-controls">${btns}</div>
            </div>`;
        }).join('');

        if (camPanelOpen.size > 0) {
            camPanelOpen.forEach(armId => {
                const stillExists = arms.find(a => a.arm_id === armId);
                if (stillExists) renderCamPanel(armId);
                else camPanelOpen.delete(armId);
            });
        }

        if (!sessionStorage.getItem('cam_verify_shown')) {
            sessionStorage.setItem('cam_verify_shown', '1');
            const safeArms = arms.filter(a => getEffectiveStatus(a) !== 'busy');
            if (safeArms.length > 0) {
                safeArms.forEach(a => toggleCamPanel(a.arm_id));
            }
        }
    }

    /* ── Camera verify / swap ── */
    const camPanelOpen = new Set();
    const camPreviewCache = new Map();

    function toggleCamPanel(armId) {
        if (camPanelOpen.has(armId)) {
            camPanelOpen.delete(armId);
            camPreviewCache.delete(armId);
            const el = document.getElementById('cam-panel-' + armId);
            if (el) el.innerHTML = '';
            return;
        }
        camPanelOpen.add(armId);
        renderCamPanel(armId, true);
    }

    function _paintCamPanel(armId, result) {
        const el = document.getElementById('cam-panel-' + armId);
        if (!el) return;
        const arm = lastArms.find(a => a.arm_id === armId);
        if (!arm) return;

        const others = lastArms.filter(o => {
            if (o.arm_id === armId) return false;
            return getEffectiveStatus(o) !== 'busy';
        });
        const swapOptions = others.length
            ? others.map(o => `<option value="${o.arm_id}">${o.name} (cam ${o.camera_id})</option>`).join('')
            : '<option value="" disabled>No non-busy arm to swap with</option>';

        let body;
        if (!result) {
            body = `<div class="cam-loading">Loading camera ${arm.camera_id}…</div>`;
        } else if (result.success) {
            body = `<img src="data:image/jpeg;base64,${result.image}" alt="Camera ${result.camera_id}">`;
        } else {
            body = `<div class="cam-err">${result.error || 'Preview failed'}</div>`;
        }

        el.innerHTML = `<div class="cam-panel">
            ${body}
            <div class="cam-hint">Does this view match <strong>${arm.name}</strong>'s physical position?</div>
            <div class="cam-swap-row">
                <select id="cam-swap-sel-${armId}" ${others.length ? '' : 'disabled'}>${swapOptions}</select>
                <button class="cam-btn" ${others.length ? '' : 'disabled'} onclick="doSwap(${armId})">Swap</button>
                <button class="cam-btn" onclick="renderCamPanel(${armId}, true)" title="Recapture">⟳</button>
                <button class="cam-btn" onclick="toggleCamPanel(${armId})">✕</button>
            </div>
        </div>`;
    }

    async function renderCamPanel(armId, forceRefresh) {
        if (!camPanelOpen.has(armId)) return;
        if (!forceRefresh && camPreviewCache.has(armId)) {
            _paintCamPanel(armId, camPreviewCache.get(armId));
            return;
        }
        _paintCamPanel(armId, null);
        let r;
        try { r = await API.get(`/api/monitor/arms/${armId}/camera-preview`); }
        catch (e) { r = { success: false, error: 'Network error' }; }
        if (!camPanelOpen.has(armId)) return;
        camPreviewCache.set(armId, r);
        _paintCamPanel(armId, r);
    }

    const WORKER_READY_STATES = new Set(['idle', 'busy', 'paused']);
    async function _waitForWorkerReady(armIds, maxMs = 8000) {
        const t0 = Date.now();
        while (Date.now() - t0 < maxMs) {
            const allReady = armIds.every(id => {
                const arm = lastArms.find(a => a.arm_id === id);
                return arm && WORKER_READY_STATES.has(arm.worker_status);
            });
            if (allReady) return true;
            await new Promise(r => setTimeout(r, 500));
        }
        return false;
    }

    async function doSwap(armId) {
        const sel = document.getElementById('cam-swap-sel-' + armId);
        if (!sel || !sel.value) return;
        const targetId = parseInt(sel.value);
        const a = lastArms.find(x => x.arm_id === armId);
        const b = lastArms.find(x => x.arm_id === targetId);
        const stA = getEffectiveStatus(a), stB = getEffectiveStatus(b);
        const restartNote = (stA === 'idle' || stB === 'idle')
            ? '\n\nNote: idle worker(s) will be briefly restarted. Queued tasks are preserved.'
            : '';
        if (!confirm(`Swap camera between ${a.name} (cam ${a.camera_id}) and ${b.name} (cam ${b.camera_id})?${restartNote}`)) return;
        const r = await API.post('/api/monitor/arms/swap-camera', { arm_id_a: armId, arm_id_b: targetId });
        if (!r.success) { toast(r.error || 'Swap failed', 'error'); return; }
        toast('Cameras swapped — workers restarting…');
        camPreviewCache.delete(armId);
        camPreviewCache.delete(targetId);
        if (camPanelOpen.has(armId)) _paintCamPanel(armId, null);
        await _waitForWorkerReady([armId, targetId], 8000);
        if (camPanelOpen.has(armId)) await renderCamPanel(armId, true);
    }

    async function armAction(action, armId) {
        if (action === 'offline' && !confirm('Set this arm offline?')) return;
        if (action === 'reset' && !confirm('Reset arm to origin and close port?')) return;
        const r = await API.post(`/api/monitor/${action}/${armId}`);
        if (r.success) toast(action.charAt(0).toUpperCase() + action.slice(1) + ' done');
        else toast(r.error || 'Failed', 'error');
    }

    /* ── Live Log Terminal ── */
    let logWs = null;
    let currentLogArm = '';
    const logColors = {
        INFO:    '#6ea8fe',
        WARNING: '#ffc107',
        ERROR:   '#f87171',
        DEBUG:   '#6e7681'
    };

    function connectLogWS() {
        if (logWs) { try { logWs.close(); } catch(e) {} }
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const armParam = currentLogArm ? `?arm_id=${currentLogArm}` : '';
        logWs = new WebSocket(`${proto}//${location.host}/api/monitor/logs/ws${armParam}`);
        logWs.onmessage = (e) => {
            const logs = JSON.parse(e.data);
            const term = document.getElementById('log-terminal');
            logs.forEach(l => {
                const color = logColors[l.level] || '#8e8e9e';
                const prefix = l.arm_name ? `<span class="log-prefix">[${l.arm_name}]</span> ` : '';
                term.innerHTML += `<div class="log-line">
                    <span class="log-ts">${l.ts}</span>
                    <span class="log-lvl" style="color:${color}">${l.level}</span>
                    <span class="log-msg">${prefix}${escHtml(l.msg)}</span>
                </div>`;
            });
            if (logs.length > 0) term.scrollTop = term.scrollHeight;
        };
        logWs.onclose = () => { setTimeout(connectLogWS, 3000); };
        logWs.onerror = () => { logWs.close(); };
    }

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function switchLogArm() {
        currentLogArm = document.getElementById('log-arm-select').value;
        document.getElementById('log-terminal').innerHTML = '';
        connectLogWS();
    }

    function clearLogs() {
        document.getElementById('log-terminal').innerHTML = '';
    }

    function updateLogArmSelect(arms) {
        const sel = document.getElementById('log-arm-select');
        const cur = sel.value;
        sel.innerHTML = '<option value="">All Arms</option>' +
            arms.map(a => `<option value="${a.arm_id}">${a.name}</option>`).join('');
        sel.value = cur;
    }

    load();
    connectLogWS();
    </script>
</body>
</html>
