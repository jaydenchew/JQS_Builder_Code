services:
  mysql:
    image: mysql:8.0
    container_name: wa-unified-mysql
    restart: unless-stopped
    ports:
      - '3308:3306'
    environment:
      MYSQL_ROOT_PASSWORD: wa_unified_2026
      MYSQL_DATABASE: wa_db
    volumes:
      - wa_unified_data:/var/lib/mysql
      # Only schema.sql should auto-run on first MySQL volume initialization.
      # Bank flow/name-mapping seed files require explicit operator import.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  wa_unified_data:
